<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Tebak Lagu</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root{--bg:#080810;--glass:#ffffff08;--glass2:#ffffff12;--border:#ffffff14;--border2:#ffffff22;--acc:#818cf8;--acc2:#a5b4fc;--red:#f87171;--green:#4ade80;--yellow:#fbbf24;--text:#eef2ff;--text2:#c7d2fe;--text3:#3730a3}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeSpeed}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at top,rgba(129,140,248,.1) 0%,transparent 55%),radial-gradient(ellipse at bottom,rgba(165,180,252,.05) 0%,transparent 55%)}
    #app{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;padding:20px 16px 80px;min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulseDot{0%,100%{opacity:.3}50%{opacity:1}}
    @keyframes notePulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.15) rotate(5deg)}}
    .fade{animation:fadeUp .3s ease both}
    .card{background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
    .ph{text-align:center;margin-bottom:20px}
    .ph .ey{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--acc2);text-transform:uppercase;background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.25);border-radius:100px;padding:4px 12px;margin-bottom:10px}
    .ph h1{font-family:'Syne',sans-serif;font-size:clamp(22px,6vw,30px);font-weight:800;letter-spacing:-.5px}
    .ph .sub{font-size:13px;color:var(--text2);margin-top:5px}
    .lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;margin-top:10px;border:none;border-radius:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .2s}
    .btn:disabled{opacity:.35;cursor:not-allowed}.btn:active:not(:disabled){transform:scale(.97)}
    .btn-ind{background:linear-gradient(135deg,var(--acc),#6366f1);color:#fff;box-shadow:0 4px 20px rgba(129,140,248,.35)}
    .btn-ghost{background:rgba(255,255,255,.07);color:var(--text2);border:1.5px solid var(--border2)}
    .inp{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
    .inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--text3)}
    .inp-code{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-align:center;letter-spacing:10px;text-transform:uppercase;padding:16px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;border-radius:100px;text-transform:uppercase}
    .b-ind{background:rgba(129,140,248,.15);color:var(--acc2);border:1px solid rgba(129,140,248,.3)}
    .b-grn{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
    .b-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .b-dim{background:rgba(255,255,255,.06);color:#475569;border:1px solid var(--border)}
    .pi{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;margin-top:8px;border-radius:12px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);font-size:13px}
    .sbar{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:13px;margin-bottom:14px;font-size:11px;color:var(--text2)}
    .rcode{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:12px;padding:14px 0}
    .lyric-card{background:linear-gradient(135deg,rgba(129,140,248,.15),rgba(165,180,252,.08));border:1.5px solid rgba(129,140,248,.35);border-radius:18px;padding:22px;margin:12px 0;text-align:center}
    .lyric-line{font-size:16px;font-weight:500;color:var(--text);line-height:1.8}
    .note-icon{font-size:48px;display:block;margin-bottom:8px;animation:notePulse 2s ease-in-out infinite}
    .opt-btn{width:100%;padding:13px 16px;margin-top:8px;border:2px solid var(--border2);border-radius:14px;background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-align:left;transition:all .2s}
    .opt-btn:hover:not(.disabled){background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.4)}
    .opt-btn.correct{border-color:var(--green);background:rgba(74,222,128,.2);color:var(--green)}
    .opt-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.15);color:var(--red)}
    .opt-btn.disabled{cursor:not-allowed;opacity:.75}
    .timer-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:12px}
    .timer-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .1s linear}
    .reveal-dots{display:flex;justify-content:center;gap:8px;margin:10px 0}
    .reveal-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);transition:all .3s}
    .reveal-dot.used{background:var(--acc)}
    .reveal-dot.current{background:var(--acc2);transform:scale(1.3)}
    .wp{display:flex;gap:5px;align-items:center;justify-content:center;margin:6px 0}
    .wp span{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulseDot .9s ease-in-out infinite}
    .wp span:nth-child(2){animation-delay:.15s}.wp span:nth-child(3){animation-delay:.3s}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px}
    .loader-ring{width:44px;height:44px;border-radius:50%;border:3px solid rgba(129,140,248,.2);border-top-color:var(--acc);animation:spin .8s linear infinite}
    .loader p{font-size:12px;color:var(--text3);letter-spacing:2px;font-weight:600;text-transform:uppercase}
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(8,8,16,.95);border:1.5px solid rgba(129,140,248,.4);border-radius:14px;padding:12px 22px;font-size:13px;font-weight:500;color:var(--text);z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:320px;text-align:center}
    #toast.show{transform:translateX(-50%) translateY(0)}
    .count-sel{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .count-btn{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border2);background:rgba(255,255,255,.07);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .count-btn:active{transform:scale(.93)}
    .count-num{flex:1;text-align:center;font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body>
<div id="app"><div class="loader"><div class="loader-ring"></div><p>memuat...</p></div></div>
<div id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const ROOM_PREFIX='tl_rooms';
const TIMER_SECS=25;
const SONGS=[
  {title:'Kesempurnaan Cinta',artist:'Rizky Febian',hints:['Kau terus hadir dalam mimpi','Selalu terbayang wajahmu','Kau yang sempurnakan hidupku'],opts:['Salah Apa Aku','Kesempurnaan Cinta','Cinta Luar Biasa','Tentang Rindu']},
  {title:'Hati-Hati di Jalan',artist:'Tulus',hints:['Siapapun yang menemanimu','Kumohon jaga dirimu','Hati-hati di jalan'],opts:['Gajah','Hati-Hati di Jalan','Manusia','Ruang Sendiri']},
  {title:'Cinta Luar Biasa',artist:'Andmesh',hints:['Aku tak bisa bayangkan','Hidupku tanpa hadirmu','Cinta luar biasa'],opts:['Cinta Luar Biasa','Kemarin','Tak Ingin Usai','Sampai Tua']},
  {title:'Pelangi',artist:'Armada',hints:['Hujan memang harus datang','Sebelum pelangi muncul','Seperti itulah kisah kita'],opts:['Pelangi','Asal Kau Bahagia','Katakan Sejujurnya','Mau Dibawa Kemana']},
  {title:'Sempurna',artist:'Andra & The Backbone',hints:['Kau begitu sempurna','Di mataku kau begitu indah','Kau membuat diriku'],opts:['Sempurna','Hitam','Musnah','Terdalam']},
  {title:'Dealova',artist:'Once',hints:['Ku ingin menjadi','Mimpi yang selalu','Hadir di setiap malammu'],opts:['Aku Bukan Untukmu','Dealova','Kucari Dirimu','Kaulah Segalanya']},
  {title:'Separuh Aku',artist:'Noah',hints:['Bilang padanya aku mencintainya','Separuh aku','Adalah dirimu'],opts:['Separuh Aku','Jika Engkau','Hidup Untukmu Mati Tanpamu','Yang Terdalam']},
  {title:'Roman Picisan',artist:'Dewa 19',hints:['Bukan kisah biasa','Tentang cinta yang ada','Roman picisan'],opts:['Roman Picisan','Kangen','Risalah Hati','Pupus']},
  {title:'Salah Apa Aku',artist:'Judika',hints:['Mengapa hatimu','Membiarkan aku','Salah apa aku padamu'],opts:['Bukan Rayuan Gombal','Aku Yang Tersakiti','Salah Apa Aku','Sedang Rindu']},
  {title:'Tentang Rindu',artist:'Virzha',hints:['Di sini aku masih menunggu','Sebuah kabar tentang dirimu','Tentang rindu yang tak terjawab'],opts:['Aku Bisa Apa','Tentang Rindu','Ku Menunggu','Janji Suci']},
  {title:'Pupus',artist:'Dewa 19',hints:['Ku mencoba tuk melanjutkan','Hidup tanpa cintamu','Namun semua terasa hampa'],opts:['Pupus','Kangen','Cinta Adalah Misteri','Bukan Cinta Biasa']},
  {title:'Kau Adalah',artist:'Isyana Sarasvati',hints:['Kau adalah mata airku','Kau adalah isyarat','Kau adalah karya terbaik'],opts:['Kau Adalah','Keep Being You','Tetap Dalam Jiwa','Mimpi']},
  {title:'Cinta Sejati',artist:'BCL',hints:['Tak perlu kata','Untuk ungkapkan','Betapa kau berarti bagiku'],opts:['Cinta Sejati','Karena Ku Sanggup','Kau Adalah','Ku Tak Bisa']},
  {title:'Bunga Terakhir',artist:'Obbie Messakh',hints:['Telah lama kau pergi','Tinggalkan daku sendiri','Merana dalam sepi'],opts:['Bunga Terakhir','Kasih Putih','Bila Kau Tak Ada','Masih Ada']},
  {title:'Yakin Bisa',artist:'Idgitaf',hints:['Percayalah kau bisa','Kau pasti bisa','Yakin bisa melewatinya'],opts:['Yakin Bisa','Firasat','Noktah Merah Darah','Kesedihan Yang Panjang']},
];
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
const S={myId:localStorage.getItem('tl_id')||genId(),myName:'',roomCode:'',isHost:false,mode:'online',room:null,unsubFn:null,timerInterval:null,timerLeft:TIMER_SECS,oCount:4,oNames:Array.from({length:20},(_,i)=>'Pemain '+(i+1))};
localStorage.setItem('tl_id',S.myId);
let db=null;
function initFB(){try{if(!window.FIREBASE_CONFIG||window.FIREBASE_CONFIG.apiKey.startsWith('GANTI'))return false;if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);db=firebase.database();return true;}catch(e){return false;}}
const FB=initFB();
function genId(){return'l'+Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function toast(msg,d=2500){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),d);}
function render(h){if(S._rafId)cancelAnimationFrame(S._rafId);S._rafId=requestAnimationFrame(()=>{const app=document.getElementById('app');if(app)app.innerHTML='<div class="fade">'+h+'</div>';});}
function $(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function saveSession(c,h){try{localStorage.setItem('session_room_'+ROOM_PREFIX,c);localStorage.setItem('session_host_'+ROOM_PREFIX,h?'1':'0');}catch(e){}}
function clearSession(){try{localStorage.removeItem('session_room_'+ROOM_PREFIX);localStorage.removeItem('session_host_'+ROOM_PREFIX);}catch(e){}}
async function cleanupOldRooms(){if(!db)return;try{const snap=await db.ref(ROOM_PREFIX).once('value');if(!snap.exists())return;const rooms=snap.val();const now=Date.now();const ps=[];Object.entries(rooms).forEach(([code,room])=>{const age=now-(room.createdAt||0);if(age>6*60*60*1000||(room.status==='ended'&&age>30*60*1000))ps.push(db.ref(ROOM_PREFIX+'/'+code).remove());});if(ps.length)await Promise.all(ps);}catch(e){}}
async function tryResumeSession(){if(!FB||!db)return false;let code;try{code=localStorage.getItem('session_room_'+ROOM_PREFIX);}catch(e){return false;}if(!code)return false;const isHost=localStorage.getItem('session_host_'+ROOM_PREFIX)==='1';try{const snap=await Promise.race([db.ref(ROOM_PREFIX+'/'+code).once('value'),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))]);if(!snap.exists()){clearSession();return false;}const room=snap.val();if(room.status==='ended'){clearSession();return false;}if(!room.players||!room.players[S.myId]){clearSession();return false;}S.roomCode=code;S.isHost=isHost;S.mode='online';fbListen(code);return true;}catch(e){clearSession();return false;}}
function startTimer(onExp){stopTimer();S.timerLeft=TIMER_SECS;S.timerInterval=setInterval(()=>{S.timerLeft=Math.max(0,S.timerLeft-.1);const f=$('timer-fill');if(f){f.style.width=(S.timerLeft/TIMER_SECS*100)+'%';f.style.background=S.timerLeft>15?'linear-gradient(90deg,#818cf8,#a5b4fc)':S.timerLeft>8?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#ef4444,#f87171)';}if(S.timerLeft<=0){stopTimer();if(onExp)onExp();}},100);}
function stopTimer(){if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}}
async function fbCreate(name){let code,exists=true;while(exists){code=genCode();const s=await db.ref(ROOM_PREFIX+'/'+code).once('value');exists=s.exists()&&s.val().status!=='ended';}const qs=shuffle(SONGS).slice(0,10);const now=Date.now();await db.ref(ROOM_PREFIX+'/'+code).set({code,hostId:S.myId,status:'lobby',round:0,questions:qs,currentQ:null,answers:null,hintsShown:1,qStart:null,createdAt:now,players:{[S.myId]:{name,joinedAt:now,score:0,answered:false}}});return code;}
async function fbJoin(code,name){const s=await db.ref(ROOM_PREFIX+'/'+code).once('value');if(!s.exists())throw new Error('Room tidak ditemukan');const r=s.val();if(r.status==='ended')throw new Error('Game sudah berakhir');if(Object.keys(r.players||{}).length>=20)throw new Error('Room penuh');if(r.players&&r.players[S.myId]){await db.ref(ROOM_PREFIX+'/'+code+'/players/'+S.myId+'/name').set(name);return r;}await db.ref(ROOM_PREFIX+'/'+code+'/players/'+S.myId).set({name,joinedAt:Date.now(),score:0,answered:false});return r;}
function fbListen(code){if(S.unsubFn)S.unsubFn();saveSession(code,S.isHost);const ref=db.ref(ROOM_PREFIX+'/'+code);const h=ref.on('value',snap=>{
      if(!snap.exists())return;
      const prev=S.room;
      S.room=snap.val();
      // Skip re-render jika status & data penting tidak berubah
      if(prev&&prev.status===S.room.status&&JSON.stringify(prev)===JSON.stringify(S.room))return;
      renderPhase();
    });S.unsubFn=()=>ref.off('value',h);}
async function fbStart(){const r=S.room,pids=Object.keys(r.players);if(pids.length<2){toast('Minimal 2 pemain!');return;}const u={};pids.forEach(id=>{u['players/'+id+'/score']=0;u['players/'+id+'/answered']=false;});u.status='question';u.round=1;u.currentQ=r.questions[0];u.answers=null;u.hintsShown=1;u.qStart=Date.now();await db.ref(ROOM_PREFIX+'/'+S.roomCode).update(u);}
async function fbAnswer(opt){const r=S.room,me=r.players[S.myId];if(me?.answered)return;const t=(Date.now()-(r.qStart||Date.now()))/1000;const correct=opt===r.currentQ?.title;const hintPenalty=(r.hintsShown||1)*100;const timePenalty=Math.round(t*8);const pts=correct?Math.max(50,500-hintPenalty-timePenalty):0;const u={['answers/'+S.myId]:opt,['players/'+S.myId+'/answered']:true};if(pts>0)u['players/'+S.myId+'/score']=(me?.score||0)+pts;await db.ref(ROOM_PREFIX+'/'+S.roomCode).update(u);stopTimer();const s=await db.ref(ROOM_PREFIX+'/'+S.roomCode).once('value');const room=s.val();if(Object.values(room.players).every(p=>p.answered))await db.ref(ROOM_PREFIX+'/'+S.roomCode).update({status:'result'});}
async function fbRevealHint(){if(!S.isHost)return;const r=S.room;const cur=(r.hintsShown||1);if(cur>=3)return;await db.ref(ROOM_PREFIX+'/'+S.roomCode+'/hintsShown').set(cur+1);}
async function fbNext(){if(!S.isHost)return;const r=S.room;const nextR=(r.round||0)+1;const qs=r.questions||[];if(nextR>qs.length){await db.ref(ROOM_PREFIX+'/'+S.roomCode).update({status:'ended'});clearSession();return;}const pids=Object.keys(r.players);const u={};pids.forEach(id=>{u['players/'+id+'/answered']=false;});u.status='question';u.round=nextR;u.currentQ=qs[nextR-1];u.answers=null;u.hintsShown=1;u.qStart=Date.now();await db.ref(ROOM_PREFIX+'/'+S.roomCode).update(u);}
async function fbPlayAgain(){if(!S.isHost)return;const r=S.room;const pids=Object.keys(r.players);const qs=shuffle(SONGS).slice(0,10);const u={};pids.forEach(id=>{u['players/'+id+'/score']=0;u['players/'+id+'/answered']=false;});u.status='lobby';u.round=0;u.questions=qs;u.currentQ=null;u.answers=null;u.hintsShown=1;await db.ref(ROOM_PREFIX+'/'+S.roomCode).update(u);}
async function fbKick(tid){if(!S.isHost||tid===S.myId)return;await db.ref(ROOM_PREFIX+'/'+S.roomCode+'/players/'+tid).remove();toast('Pemain dikeluarkan');}
function renderPhase(){if(S.mode==='offline'){renderOff();return;}const r=S.room;if(!r)return;stopTimer();if(r.status==='lobby')return rLobby();if(r.status==='question')return rQuestion();if(r.status==='result')return rResult();if(r.status==='ended')return rEnded();}
function rHome(){render('<div class="ph" style="margin-top:8px"><div class="ey">&#127925; Tebak Lagu</div><h1>Tebak dari Lirik!</h1><div class="sub">Tebak judul lagu dari penggalan liriknya</div></div><div class="card"><div class="lbl">Nama kamu</div><input id="ni" class="inp" placeholder="Masukkan namamu..." maxlength="20" value="'+esc(S.myName)+'" oninput="S.myName=this.value.trim()"><div style="font-size:11px;color:var(--text3);margin-top:6px">'+(FB?'<span style="color:var(--green)">&#9679; Firebase terhubung</span>':'<span style="color:var(--red)">&#9679; Firebase belum dikonfigurasi</span>')+'</div></div>'+(FB?'<div class="card" style="border-color:rgba(129,140,248,.3);background:rgba(129,140,248,.07)"><div class="lbl">&#127760; Online</div><button class="btn btn-ind" onclick="onCreate()">+ Buat Room Baru</button><div style="display:flex;align-items:center;gap:10px;margin:12px 0;font-size:11px;color:var(--text3)"><div style="flex:1;height:1px;background:var(--border)"></div>atau<div style="flex:1;height:1px;background:var(--border)"></div></div><input id="ci" class="inp inp-code" placeholder="KODE" maxlength="4" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"><button class="btn btn-ghost" onclick="onJoin()" style="margin-top:8px">&#8594; Join Room</button></div>':'')+'<div class="card"><div class="lbl">&#128241; Offline</div><button class="btn btn-ghost" onclick="onOffline()">&#9654; Main Offline</button></div><div class="card" style="padding:14px"><div class="lbl">Sistem Poin</div><p style="font-size:13px;color:var(--text2);line-height:1.7">Tebak dari <b style="color:var(--acc2)">1 baris lirik = 400+ poin</b>, 2 baris = 300+ poin, 3 baris = 200+ poin. Host bisa reveal baris tambahan!</p></div><button class="btn btn-ghost" onclick="location.href='index.html'" style="margin-top:4px">&#8592; Kembali ke Hub</button>');setTimeout(()=>{const e=$('ni');if(e&&!S.myName)e.focus();},100);}
async function onCreate(){const n=($('ni')?.value||'').trim()||S.myName;if(!n){toast('Masukkan namamu!');return;}S.myName=n;render('<div class="loader"><div class="loader-ring"></div><p>Membuat room...</p></div>');try{const c=await fbCreate(n);S.roomCode=c;S.isHost=true;S.mode='online';fbListen(c);}catch(e){toast('Gagal: '+e.message);rHome();}}
async function onJoin(){const n=($('ni')?.value||'').trim()||S.myName;const c=($('ci')?.value||'').toUpperCase().trim();if(!n){toast('Masukkan namamu!');return;}if(c.length!==4){toast('Kode harus 4 huruf!');return;}S.myName=n;render('<div class="loader"><div class="loader-ring"></div><p>Bergabung...</p></div>');try{await fbJoin(c,n);S.roomCode=c;S.isHost=false;S.mode='online';fbListen(c);}catch(e){toast('Gagal: '+e.message);rHome();}}
function onOffline(){S.myName=($('ni')?.value||'').trim()||S.myName||'Host';S.mode='offline';rOffSetup();}
function leaveRoom(){stopTimer();if(S.unsubFn){S.unsubFn();S.unsubFn=null;}clearSession();S.room=null;S.roomCode='';S.isHost=false;S.mode='online';rHome();}
function copyCode(c){navigator.clipboard?.writeText(c).then(()=>toast('Kode disalin!')).catch(()=>toast('Kode: '+c));}
function rLobby(){const r=S.room,ps=r.players||{};const pids=Object.keys(ps).sort((a,b)=>(ps[a].joinedAt||0)-(ps[b].joinedAt||0));render('<div class="ph" style="margin-top:6px"><div class="ey">Lobby</div><h1>&#127925; Tebak Lagu</h1></div><div class="card" style="text-align:center"><div class="lbl">Kode Room</div><div class="rcode">'+esc(r.code)+'</div><button class="btn btn-ghost" onclick="copyCode(''+esc(r.code)+'')" style="max-width:180px;margin:0 auto;padding:10px">&#9109; Salin Kode</button></div><div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="lbl" style="margin:0">Pemain</div><span class="badge b-ind">'+pids.length+'/20</span></div>'+pids.map(id=>'<div class="pi"><div style="display:flex;gap:8px"><span style="font-weight:500">'+esc(ps[id].name)+'</span>'+(id===r.hostId?'<span class="badge b-ind">Host</span>':'')+(id===S.myId?'<span class="badge b-dim">Kamu</span>':'')+'</div>'+(S.isHost&&id!==S.myId?'<button onclick="fbKick(''+id+'')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:600">Kick</button>':'<span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>')+'</div>').join('')+'</div>'+(S.isHost?'<button class="btn btn-ind" '+(pids.length>=2?'':'disabled')+' onclick="fbStart()">&#9654; Mulai Game &middot; '+pids.length+' Pemain</button>':'<div class="card" style="text-align:center;padding:20px"><div class="wp"><span></span><span></span><span></span></div><p style="font-size:13px;color:var(--text2);margin-top:8px">Menunggu host...</p></div>')+'<button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:6px">&#8592; Keluar</button>');}
function rQuestion(){const r=S.room,me=r.players[S.myId];const q=r.currentQ;const hintsShown=r.hintsShown||1;const hints=q?.hints||[];const opts=q?.opts||[];const ac=Object.values(r.players).filter(p=>p.answered).length;const tc=Object.keys(r.players).length;if(!me?.answered)startTimer(()=>fbAnswer('__timeout__'));render('<div class="sbar fade"><span style="color:var(--acc2);font-weight:700;font-family:'Syne',sans-serif">Lagu '+r.round+'/10</span><span style="font-size:11px;color:var(--text2)">'+ac+'/'+tc+' jawab</span><span>'+esc(r.code)+'</span></div><div class="timer-bar"><div id="timer-fill" class="timer-fill" style="width:'+(me?.answered?0:S.timerLeft/TIMER_SECS*100)+'%"></div></div><div class="lyric-card"><span class="note-icon">&#127925;</span>'+hints.slice(0,hintsShown).map(line=>'<div class="lyric-line">"'+esc(line)+'"</div>').join('')+(hintsShown<hints.length?'<div style="font-size:12px;color:rgba(165,180,252,.4);margin-top:8px;letter-spacing:2px">...</div>':'')+'</div><div class="reveal-dots">'+hints.map((_,i)=>'<div class="reveal-dot '+(i<hintsShown?'used'+(i===hintsShown-1?' current':''):'')+'"></div>').join('')+'</div>'+(me?.answered?'<div class="card" style="text-align:center;padding:20px;border-color:rgba(129,140,248,.3)"><p style="font-weight:600;color:var(--acc2)">&#10003; Jawaban terkirim!</p><p style="font-size:13px;color:var(--text2);margin-top:4px">'+ac+'/'+tc+' sudah jawab</p></div>':'<div>'+opts.map(opt=>'<button class="opt-btn" onclick="fbAnswer(''+esc(opt)+'')">'+esc(opt)+'</button>').join('')+'</div>'+(S.isHost&&hintsShown<hints.length?'<button class="btn btn-ghost" onclick="fbRevealHint()" style="margin-top:8px;font-size:13px">&#128161; Reveal Baris Berikutnya (&minus;100 poin)</button>':'')));if(me?.answered)stopTimer();}
function rResult(){const r=S.room;const q=r.currentQ;const ans=r.answers||{};const ps=r.players;render('<div class="sbar fade"><span style="color:var(--acc2);font-weight:700;font-family:'Syne',sans-serif">Hasil Lagu '+r.round+'/10</span><span>'+esc(r.code)+'</span></div><div class="lyric-card" style="padding:18px"><div style="font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:8px">JAWABAN BENAR</div><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--acc2)">'+esc(q?.title)+'</div><div style="font-size:13px;color:var(--text2);margin-top:4px">&#127908; '+esc(q?.artist)+'</div><div style="margin-top:12px">'+(q?.hints||[]).map(line=>'<div style="font-size:14px;color:var(--text);margin-bottom:4px">"'+esc(line)+'"</div>').join('')+'</div></div><div class="card">'+(q?.opts||[]).map(opt=>{const isCorrect=opt===q?.title;const vc=Object.values(ans).filter(a=>a===opt).length;const pct=Object.keys(ps).length>0?Math.round(vc/Object.keys(ps).length*100):0;return'<div class="opt-btn '+(isCorrect?'correct':'wrong')+' disabled" style="cursor:default;margin-top:8px;display:flex;align-items:center;justify-content:space-between"><span>'+esc(opt)+'</span><span style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px">'+pct+'%</span></div>';}).join('')+'</div><div class="card" style="padding:14px"><div class="lbl">Skor Sementara</div>'+Object.entries(ps).sort((a,b)=>(b[1].score||0)-(a[1].score||0)).map(([id,p],i)=>'<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text3);width:20px">'+(i+1)+'</span><span style="flex:1;font-size:13px">'+esc(p.name)+(id===S.myId?' (kamu)':'')+'</span><span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--acc2)">'+(p.score||0)+'</span></div>').join('')+'</div>'+(S.isHost?'<button class="btn btn-ind" onclick="fbNext()">'+(r.round<10?'&#8594; Lagu Berikutnya':'&#127937; Hasil Akhir')+'</button>':'<div class="card" style="text-align:center;padding:16px"><div class="wp"><span></span><span></span><span></span></div></div>'));}
function rEnded(){clearSession();const r=S.room,ps=r.players;const sorted=Object.entries(ps).sort((a,b)=>(b[1].score||0)-(a[1].score||0));const medals=['&#127941;','&#129352;','&#129353;'];render('<div style="padding-top:16px;animation:fadeUp .4s ease both;text-align:center"><div style="font-size:56px;margin-bottom:10px">&#127925;</div><div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--acc2)">Game Selesai!</div><p style="font-size:13px;color:var(--text2);margin:6px 0 22px">Siapa yang paling hafal lagu?</p><div class="card" style="text-align:left"><div class="lbl">Papan Skor Akhir</div>'+sorted.map(([id,p],i)=>'<div class="pi" style="'+(i===0?'border-color:rgba(129,140,248,.5);background:rgba(129,140,248,.1)':'')+'"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">'+(medals[i]||String(i+1))+'</span><span style="font-weight:500">'+esc(p.name)+(id===S.myId?' <span class="badge b-dim" style="font-size:9px">Kamu</span>':'')+'</span></div><span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--acc2)">'+(p.score||0)+'</span></div>').join('')+'</div>'+(S.isHost?'<button class="btn btn-ind" onclick="fbPlayAgain()">&#8634; Main Lagi</button>':'<div class="card" style="padding:16px;text-align:center"><div class="wp"><span></span><span></span><span></span></div></div>')+'<button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:6px">&#8592; Menu Utama</button></div>');}
function rOffSetup(){render('<div class="ph" style="margin-top:6px"><div class="ey">Offline</div><h1>Setup Pemain</h1></div><div class="card"><div class="lbl">Jumlah Pemain</div><div class="count-sel"><button class="count-btn" onclick="oChg(-1)">&minus;</button><div id="ocd" class="count-num">'+S.oCount+'</div><button class="count-btn" onclick="oChg(1)">+</button></div><div style="height:1px;background:var(--border);margin:14px 0"></div><div class="lbl">Nama Pemain</div><div id="onl"></div><button class="btn btn-ind" onclick="oStart()" style="margin-top:14px">&#9654; Mulai Game</button></div><button class="btn btn-ghost" onclick="rHome()">&#8592; Kembali</button>');renderONames();}
function oChg(d){S.oCount=Math.max(1,Math.min(20,S.oCount+d));$('ocd').textContent=S.oCount;renderONames();}
function renderONames(){const c=$('onl');if(!c)return;c.innerHTML=Array.from({length:S.oCount},(_,i)=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:22px;text-align:right;font-size:13px;color:var(--text3);font-weight:600">'+(i+1)+'</span><input class="inp" value="'+esc(S.oNames[i]||'Pemain '+(i+1))+'" oninput="S.oNames['+i+']=this.value.trim()" placeholder="Pemain '+(i+1)+'" maxlength="20" style="padding:10px 14px"></div>').join('');}
function oStart(){S.oPlayers=S.oNames.slice(0,S.oCount).map((n,i)=>({id:i,name:n||'Pemain '+(i+1),score:0}));S.oQList=shuffle(SONGS).slice(0,10);S.oQIdx=0;S.oPIdx=0;S.oAnswers={};S.oHints=1;S.oPhase='q';renderOff();}
function renderOff(){if(S.oPhase==='q')return rOQ();if(S.oPhase==='result')return rOResult();if(S.oPhase==='ended')return rOEnded();}
function rOQ(){const p=S.oPlayers[S.oPIdx];const q=S.oQList[S.oQIdx];render('<div class="sbar fade"><span style="color:var(--acc2);font-weight:700;font-family:'Syne',sans-serif">Lagu '+(S.oQIdx+1)+'/10</span><span style="color:var(--text2);font-size:12px">'+esc(p.name)+'</span></div><div class="lyric-card"><span class="note-icon">&#127925;</span>'+q.hints.slice(0,S.oHints).map(line=>'<div class="lyric-line">"'+esc(line)+'"</div>').join('')+'</div><div class="reveal-dots">'+q.hints.map((_,i)=>'<div class="reveal-dot '+(i<S.oHints?'used'+(i===S.oHints-1?' current':''):'')+'"></div>').join('')+'</div><div>'+q.opts.map(opt=>'<button class="opt-btn" onclick="oAnswer(''+esc(opt)+'')">'+esc(opt)+'</button>').join('')+'</div>'+(S.oHints<q.hints.length?'<button class="btn btn-ghost" onclick="S.oHints++;renderOff()" style="margin-top:8px;font-size:13px">&#128161; Reveal Baris Berikutnya</button>':''));}
function oAnswer(opt){const q=S.oQList[S.oQIdx];S.oAnswers[S.oPlayers[S.oPIdx].id]=opt;const correct=opt===q.title;if(correct)S.oPlayers[S.oPIdx].score+=Math.max(50,400-(S.oHints-1)*100);if(S.oPIdx+1<S.oPlayers.length){S.oPIdx++;S.oHints=1;renderOff();}else{S.oPhase='result';renderOff();}}
function rOResult(){const q=S.oQList[S.oQIdx];render('<div class="sbar fade"><span style="color:var(--acc2);font-weight:700;font-family:'Syne',sans-serif">Hasil '+(S.oQIdx+1)+'/10</span></div><div class="lyric-card" style="padding:18px"><div style="font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:8px">JAWABAN BENAR</div><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--acc2)">'+esc(q.title)+'</div><div style="font-size:13px;color:var(--text2);margin-top:4px">&#127908; '+esc(q.artist)+'</div></div><div class="card" style="padding:14px"><div class="lbl">Skor</div>'+S.oPlayers.map(p=>{const myAns=S.oAnswers[p.id];const correct=myAns===q.title;return'<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;flex:1">'+esc(p.name)+'</span><span class="badge '+(correct?'b-grn':'b-red')+'">'+(correct?'&#10003; Benar':'&#10007; Salah')+'</span><span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--acc2)">'+p.score+'</span></div>';}).join('')+'</div><button class="btn btn-ind" onclick="oNext()">'+(S.oQIdx+1<10?'&#8594; Lagu Berikutnya':'&#127937; Hasil Akhir')+'</button>');}
function oNext(){if(S.oQIdx+1<10){S.oQIdx++;S.oPIdx=0;S.oAnswers={};S.oHints=1;S.oPhase='q';renderOff();}else{S.oPhase='ended';renderOff();}}
function rOEnded(){const sorted=[...S.oPlayers].sort((a,b)=>b.score-a.score);const medals=['&#127941;','&#129352;','&#129353;'];render('<div style="padding-top:16px;animation:fadeUp .4s ease both;text-align:center"><div style="font-size:56px;margin-bottom:10px">&#127925;</div><div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--acc2)">Game Selesai!</div><div class="card" style="text-align:left;margin-top:20px">'+sorted.map((p,i)=>'<div class="pi" style="'+(i===0?'border-color:rgba(129,140,248,.5);background:rgba(129,140,248,.1)':'')+'"><div style="display:flex;align-items:center;gap:8px"><span>'+(medals[i]||'')+'</span><span style="font-weight:500">'+esc(p.name)+'</span></div><span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--acc2)">'+p.score+'</span></div>').join('')+'</div><button class="btn btn-ind" onclick="oStart()">&#8634; Main Lagi</button><button class="btn btn-ghost" onclick="S.mode='online';rHome()" style="margin-top:6px">&#8592; Menu Utama</button></div>');}
window.onload=async()=>{try{cleanupOldRooms();}catch(e){}try{const r=await tryResumeSession();if(!r)rHome();}catch(e){rHome();}};
</script>
</body>
</html>
